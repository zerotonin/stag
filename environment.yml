# STAG conda environment
#
# Install:  conda env create -f environment.yml
# Update:   conda env update -f environment.yml --prune
# Activate: conda activate stag
#
# GPU clustering on Aoraki
# ------------------------
# The production SLURM sweep ran in a `rapids-24.02` env on Aoraki —
# that release of RAPIDS is the reference combination of cuML + cupy.
# Newer RAPIDS releases (25.x+) have breaking API changes (KMeans
# init parameter renames, StandardScaler signature drift) so we pin
# here to keep `python -m stag.clustering.kmeans` reproducible.
#
# RAPIDS 24.02 requires CUDA 11.8 or 12.0 / 12.2; Aoraki's GPU nodes
# carry CUDA 12.x.  If you are recreating the env on a machine with
# a different CUDA, switch to the appropriate `cuda-version` pin —
# see https://docs.rapids.ai/install/ .

name: stag
channels:
  - rapidsai
  - conda-forge
  - defaults

dependencies:
  - python>=3.10
  - ipython
  - numpy>=1.24
  # pandas: RAPIDS 24.02 ships cudf 24.2 which requires pandas<2.0.
  # STAG does not use any pandas-2.x-only feature, so pinning here
  # keeps the env reproducible against the production GPU stack.
  - pandas>=1.5,<2.0
  - scipy>=1.10
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn>=0.12
  - sqlalchemy>=2.0
  - tqdm>=4.65
  - pytables>=3.8
  - pyproj>=3.5
  - kneed>=0.8
  - pip:
    - astral>=3.0      # sunrise/sunset for circadian analyses (Sprint 3)

  # GPU clustering (comment out for CPU-only installs)
  # RAPIDS 24.02 is the production combination; do not unpin without
  # re-validating against the saved centroids in cluster_results/.
  - cuml=24.02.*
  - cupy=24.02.*
  - cuda-version=12.2

  # Documentation
  - sphinx>=7.0
  - sphinx_rtd_theme>=2.0

  # Development
  - pytest>=7.0
  - pytest-cov>=4.0
  - ruff

  - pip
  - pip:
      - sphinx-autodoc-typehints>=1.23
