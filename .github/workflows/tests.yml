# Run the test suite on push and pull requests.
#
# Matrix follows the STAG house style §9.1:
#   3 OS (ubuntu-latest, macos-latest, windows-latest)
#   × 4 Python versions (3.10, 3.11, 3.12, 3.13)
# Coverage is uploaded as a per-job artefact.

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff (non-blocking)
        run: |
          ruff check stag/ --exit-zero

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=stag --cov-report=xml --cov-report=term

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14
